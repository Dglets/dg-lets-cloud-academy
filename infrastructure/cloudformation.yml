AWSTemplateFormatVersion: "2010-09-09"
Description: DG-LETS Cloud Academy - Full AWS Infrastructure

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT secret for admin authentication
  AdminEmail:
    Type: String
    Description: Admin email address
  AdminPassword:
    Type: String
    NoEcho: true
    Description: Admin password (plain text - use hashed in production)

Resources:
  # ─── DynamoDB Tables ───────────────────────────────────────────────────────
  EnrollmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dg-lets-enrollments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  PartnershipsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dg-lets-partnerships
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  BlogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dg-lets-blogs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  ContactsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dg-lets-contacts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dg-lets-notifications
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ─── S3 Bucket for Frontend ────────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dg-lets-cloud-academy-frontend-${Environment}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ─── CloudFront Distribution ───────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        Enabled: true
        HttpVersion: http2

  # ─── Lambda Execution Role ─────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dg-lets-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt EnrollmentsTable.Arn
                  - !GetAtt PartnershipsTable.Arn
                  - !GetAtt BlogsTable.Arn
                  - !GetAtt ContactsTable.Arn
                  - !GetAtt NotificationsTable.Arn

  # ─── Lambda Function ───────────────────────────────────────────────────────
  ApiLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: dg-lets-api
      Runtime: nodejs20.x
      Handler: lambda.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          NODE_ENV: production
          AWS_REGION_NAME: !Ref AWS::Region
          DYNAMODB_ENROLLMENTS_TABLE: dg-lets-enrollments
          DYNAMODB_PARTNERSHIPS_TABLE: dg-lets-partnerships
          DYNAMODB_BLOGS_TABLE: dg-lets-blogs
          DYNAMODB_CONTACTS_TABLE: dg-lets-contacts
          DYNAMODB_NOTIFICATIONS_TABLE: dg-lets-notifications
          JWT_SECRET: !Ref JwtSecret
          ADMIN_EMAIL: !Ref AdminEmail
          ADMIN_PASSWORD: !Ref AdminPassword
      Code:
        ZipFile: |
          exports.handler = async (event) => ({
            statusCode: 200,
            body: JSON.stringify({ message: "Deploy your backend zip here" })
          });

  # ─── API Gateway ───────────────────────────────────────────────────────────
  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: dg-lets-api-gateway
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Sub "https://${CloudFrontDistribution.DomainName}"
        AllowMethods: [GET, POST, PATCH, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization]

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiLambdaFunction.Arn}/invocations"
      PayloadFormatVersion: "2.0"

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: "$default"
      Target: !Sub "integrations/${ApiIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: "$default"
      AutoDeploy: true

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*"

Outputs:
  CloudFrontURL:
    Description: Frontend URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  ApiGatewayURL:
    Description: API Gateway URL
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
  S3BucketName:
    Description: S3 bucket for frontend
    Value: !Ref FrontendBucket
